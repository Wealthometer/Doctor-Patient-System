name: HealthCare+ CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION:      ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID:  ${{ secrets.AWS_ACCOUNT_ID }}
  EKS_CLUSTER:     healthcare-cluster
  ECR_REGISTRY:    ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - patient-service
          - doctor-service
          - appointment-service
          - prescription-service
          - billing-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests — ${{ matrix.service }}
        working-directory: backend/${{ matrix.service }}
        run: mvn clean test -B

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.service }}
          path: backend/${{ matrix.service }}/target/surefire-reports/

  # ────────────────────────────────────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install dependencies
        working-directory: frontend-react
        run: npm ci

      - name: Type check
        working-directory: frontend-react
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend-react
        run: npm run lint

      - name: Run tests
        working-directory: frontend-react
        run: npm test -- --run

  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - auth-service
          - patient-service
          - doctor-service
          - appointment-service
          - prescription-service
          - notification-service
          - billing-service
          - api-gateway
          - discovery-service
          - config-server
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up JDK 21 (for backend builds)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Docker image — ${{ matrix.service }}
        working-directory: backend/${{ matrix.service }}
        run: |
          docker build \
            -t $ECR_REGISTRY/${{ matrix.service }}:${{ github.sha }} \
            -t $ECR_REGISTRY/${{ matrix.service }}:latest \
            .

      - name: Push to ECR — ${{ matrix.service }}
        run: |
          docker push $ECR_REGISTRY/${{ matrix.service }}:${{ github.sha }}
          docker push $ECR_REGISTRY/${{ matrix.service }}:latest

  # ────────────────────────────────────────────────────────────────────────────
  build-and-push-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: [test-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push frontend
        working-directory: frontend-react
        run: |
          docker build \
            --build-arg VITE_API_URL=https://api.healthcare.yourdomain.com \
            -t $ECR_REGISTRY/frontend:${{ github.sha }} \
            -t $ECR_REGISTRY/frontend:latest .
          docker push $ECR_REGISTRY/frontend:${{ github.sha }}
          docker push $ECR_REGISTRY/frontend:latest

  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes (EKS)
    runs-on: ubuntu-latest
    needs: [build-and-push, build-and-push-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER

      - name: Apply namespace & config
        run: |
          kubectl apply -f kubernetes/namespaces/namespace.yaml
          kubectl apply -f kubernetes/secrets/secrets.yaml
          kubectl apply -f kubernetes/configmaps/configmaps.yaml

      - name: Deploy databases
        run: kubectl apply -f kubernetes/statefulsets/postgres-statefulsets.yaml

      - name: Deploy microservices
        run: |
          # Substitute image tag
          sed -i "s|:latest|:${{ github.sha }}|g" kubernetes/deployments/deployments.yaml
          kubectl apply -f kubernetes/deployments/deployments.yaml

      - name: Apply HPA & Ingress
        run: |
          kubectl apply -f kubernetes/hpa/hpa.yaml
          kubectl apply -f kubernetes/ingress/ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/api-gateway     -n healthcare-system --timeout=300s
          kubectl rollout status deployment/auth-service    -n healthcare-system --timeout=300s
          kubectl rollout status deployment/patient-service -n healthcare-system --timeout=300s

      - name: Verify deployment
        run: kubectl get pods -n healthcare-system

      - name: Notify success
        if: success()
        run: echo "✅ Deployment to EKS successful — SHA ${{ github.sha }}"
