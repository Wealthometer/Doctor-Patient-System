spring:
  application:
    name: eureka-server   # ← also rename from "eureka" to match the service name
server:                   #   your other services reference "eureka-server" in their defaultZone
  port: 8761

eureka:
  client:
    fetch-registry: false
    register-with-eureka: false
    service-url:
      defaultZone: http://localhost:8761/eureka/   # ← self-reference; silences peer warnings
  server:
    wait-time-in-ms-when-sync-empty: 0
  instance:
    hostname: localhost   # ← tells Eureka its own address when running standalone