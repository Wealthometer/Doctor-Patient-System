server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
              - "${FRONTEND_URL:http://localhost:3000}"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # ── Auth Service ────────────────────────────────────────────────
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: auth-service
                fallbackUri: forward:/fallback/auth

        # ── Patient Service ─────────────────────────────────────────────
        - id: patient-service
          uri: lb://patient-service
          predicates:
            - Path=/api/v1/patients/**
          filters:
            - name: CircuitBreaker
              args:
                name: patient-service
                fallbackUri: forward:/fallback/patient

        # ── Doctor Service ──────────────────────────────────────────────
        - id: doctor-service
          uri: lb://doctor-service
          predicates:
            - Path=/api/v1/doctors/**
          filters:
            - name: CircuitBreaker
              args:
                name: doctor-service
                fallbackUri: forward:/fallback/doctor

        # ── Appointment Service ─────────────────────────────────────────
        - id: appointment-service
          uri: lb://appointment-service
          predicates:
            - Path=/api/v1/appointments/**
          filters:
            - name: CircuitBreaker
              args:
                name: appointment-service
                fallbackUri: forward:/fallback/appointment

        # ── Prescription Service ────────────────────────────────────────
        - id: prescription-service
          uri: lb://prescription-service
          predicates:
            - Path=/api/v1/prescriptions/**
          filters:
            - name: CircuitBreaker
              args:
                name: prescription-service
                fallbackUri: forward:/fallback/prescription

        # ── Billing Service ─────────────────────────────────────────────
        - id: billing-service
          uri: lb://billing-service
          predicates:
