server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
              - "${FRONTEND_URL:http://localhost:3000}"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # ── Auth Service ────────────────────────────────────────────────
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: auth-service
                fallbackUri: forward:/fallback/auth

        # ── Patient Service ─────────────────────────────────────────────
        - id: patient-service
          uri: lb://patient-service
          predicates:
            - Path=/api/v1/patients/**
          filters:
            - name: CircuitBreaker
              args:
                name: patient-service
                fallbackUri: forward:/fallback/patient

        # ── Doctor Service ──────────────────────────────────────────────
        - id: doctor-service
          uri: lb://doctor-service
          predicates:
            - Path=/api/v1/doctors/**
          filters:
            - name: CircuitBreaker
              args:
                name: doctor-service
                fallbackUri: forward:/fallback/doctor

        # ── Appointment Service ─────────────────────────────────────────
        - id: appointment-service
          uri: lb://appointment-service
          predicates:
            - Path=/api/v1/appointments/**
          filters:
            - name: CircuitBreaker
              args:
                name: appointment-service
                fallbackUri: forward:/fallback/appointment

        # ── Prescription Service ────────────────────────────────────────
        - id: prescription-service
          uri: lb://prescription-service
          predicates:
            - Path=/api/v1/prescriptions/**
          filters:
            - name: CircuitBreaker
              args:
                name: prescription-service
                fallbackUri: forward:/fallback/prescription

        # ── Billing Service ─────────────────────────────────────────────
        - id: billing-service
          uri: lb://billing-service
          predicates:
            - Path=/api/v1/billing/**
          filters:
            - name: CircuitBreaker
              args:
                name: billing-service
                fallbackUri: forward:/fallback/billing

        # ── Notification Service ────────────────────────────────────────
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**

        # ── Swagger UI aggregation ──────────────────────────────────────
        - id: auth-service-docs
          uri: lb://auth-service
          predicates:
            - Path=/auth-service/v3/api-docs
          filters:
            - RewritePath=/auth-service/v3/api-docs, /v3/api-docs

        - id: patient-service-docs
          uri: lb://patient-service
          predicates:
            - Path=/patient-service/v3/api-docs
          filters:
            - RewritePath=/patient-service/v3/api-docs, /v3/api-docs

        - id: doctor-service-docs
          uri: lb://doctor-service
          predicates:
            - Path=/doctor-service/v3/api-docs
          filters:
            - RewritePath=/doctor-service/v3/api-docs, /v3/api-docs

        - id: appointment-service-docs
          uri: lb://appointment-service
          predicates:
            - Path=/appointment-service/v3/api-docs
          filters:
            - RewritePath=/appointment-service/v3/api-docs, /v3/api-docs

        - id: prescription-service-docs
          uri: lb://prescription-service
          predicates:
            - Path=/prescription-service/v3/api-docs
          filters:
            - RewritePath=/prescription-service/v3/api-docs, /v3/api-docs

        - id: billing-service-docs
          uri: lb://billing-service
          predicates:
            - Path=/billing-service/v3/api-docs
          filters:
            - RewritePath=/billing-service/v3/api-docs, /v3/api-docs

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:eureka-secret}@${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
